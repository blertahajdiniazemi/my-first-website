<!doctype html>
<html lang="sq">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Blerta Ankande</title>

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: Arial, sans-serif;
      background: #f7f8fc;
      color: #222;
    }

    header {
      background: #111827;
      color: white;
      padding: 18px 40px;
    }

    .nav {
      max-width: 1200px;
      margin: auto;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .logo { font-size: 26px; font-weight: bold; }

    .nav-links a {
      color: white;
      margin-left: 20px;
      text-decoration: none;
      font-weight: bold;
    }

    .hero {
      text-align: center;
      padding: 80px 20px;
      background: linear-gradient(135deg, #dbeafe, #eef2ff);
    }

    .hero h1 { font-size: 44px; margin-bottom: 10px; }
    .hero p { font-size: 20px; margin-bottom: 20px; }

    .btn {
      background: #2563eb;
      color: white;
      padding: 12px 20px;
      border-radius: 8px;
      text-decoration: none;
      font-weight: bold;
    }

    .section {
      max-width: 1200px;
      margin: auto;
      padding: 60px 20px;
    }

    .section h2 {
      text-align: center;
      margin-bottom: 30px;
      font-size: 32px;
    }

    .items-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 24px;
    }

    .card {
      background: white;
      border-radius: 14px;
      overflow: hidden;
      box-shadow: 0 6px 20px rgba(0,0,0,0.08);
    }

    .card img {
      width: 100%;
      height: 200px;
      object-fit: cover;
    }

    .card-body {
      padding: 18px;
    }

    .status {
      font-size: 12px;
      padding: 6px 10px;
      border-radius: 999px;
      display: inline-block;
      margin-bottom: 10px;
    }

    .status-live {
      background: #dcfce7;
      color: #166534;
    }

    .status-sold {
      background: #fee2e2;
      color: #991b1b;
    }

    .price {
      font-weight: bold;
      color: #2563eb;
      margin-bottom: 6px;
    }

    .offer { margin-bottom: 12px; }

    .btn-small {
      display: inline-block;
      padding: 8px 12px;
      background: #2563eb;
      color: white;
      border-radius: 6px;
      text-decoration: none;
      font-size: 14px;
    }

    footer {
      background: #111827;
      color: white;
      text-align: center;
      padding: 20px;
    }
  </style>
</head>

<body>

<header>
  <div class="nav">
    <div class="logo">Blerta Ankande</div>
    <div class="nav-links">
      <a href="#items">Produktet</a>
    </div>
  </div>
</header>

<section class="hero">
  <h1>Bli dhe Bëj Oferta</h1>
  <p>Platformë për shitje ku mund të bësh oferta për produkte.</p>
  <a href="#items" class="btn">Shiko Produktet</a>
</section>

<section class="section" id="items">
  <h2>Produktet</h2>

  <div class="items-grid">

    <div class="card">
      <img src="https://images.unsplash.com/photo-1582582429416-97b6dfe0f87d" alt="">
      <div class="card-body">
        <span class="status status-live">Në Ankand</span>
        <h3>Karrige Druri</h3>
        <p class="price">€80</p>
        <p class="offer">Oferta: €110</p>
        <a href="#" class="btn-small">Bëj Ofertë</a>
      </div>
    </div>

    <div class="card">
      <img src="https://images.unsplash.com/photo-1585386959984-a41552231658" alt="">
      <div class="card-body">
        <span class="status status-live">Në Ankand</span>
        <h3>Çantë Mode</h3>
        <p class="price">€120</p>
        <p class="offer">Oferta: €150</p>
        <a href="#" class="btn-small">Bëj Ofertë</a>
      </div>
    </div>

    <div class="card">
      <img src="https://images.unsplash.com/photo-1519741497674-611481863552" alt="">
      <div class="card-body">
        <span class="status status-sold">E Shitur</span>
        <h3>Orë Smart</h3>
        <p class="price">€140</p>
      </div>
    </div>

  </div>
</section>

<footer>
  <p>© 2026 Blerta Ankande</p>
</footer>

</body>
</html>
